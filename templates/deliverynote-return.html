

{% extends "menu.html" %}

{% block extra_css %}
<link rel="stylesheet"
href="{{ url_for('static', filename='deliverynote-return.css') }}">
{% endblock %}

{% block content %}

<div class="dnr-page">

  <!-- HEADER -->
  <div class="dnr-header">

    <h2 class="dnr-heading">
      Delivery Note Return
    </h2>

    <button
      type="button"
      class="dnr-btn-primary"
      id="newDnrBtn"
    >
      + New Delivery Note Return
    </button>

  </div>

  <!-- CARD -->
  <div class="dnr-card">

    <!-- SEARCH -->
    <div class="dnr-search-row">

      <div class="dnr-search-wrap">

        <input
          type="text"
          id="dnrSearchInput"
          class="dnr-search-input"
          placeholder="Search by ID number 🔍︎"
          autocomplete="off"
        >

      </div>

      <button
        type="button"
        class="dnr-clear-link"
        id="dnrClearBtn"
      >
        Clear Filter
      </button>

    </div>

    <!-- FILTER -->
    <div class="dnr-filters">

      <!-- STATUS -->
      <div class="dnr-filter">

        <label class="dnr-label">
          DNR Status
        </label>

        <select
          id="dnrStatusFilter"
          class="dnr-select"
        >

          <!-- JS dynamically append -->
          <option value="all">
            All
          </option>

        </select>

      </div>

      <!-- DATE -->
      <div class="dnr-filter dnr-date-filter">

        <label class="dnr-label">
          Delivery Date
        </label>

        <div class="dnr-date-wrap">

          <!-- FROM -->
          <div class="dnr-date-field">

            <span class="dnr-date-text">
              From
            </span>

            <input
              type="date"
              id="dnrFromDate"
              class="dnr-date-input"
            >

          </div>

          <!-- TO -->
          <div class="dnr-date-field">

            <span class="dnr-date-text">
              To
            </span>

            <input
              type="date"
              id="dnrToDate"
              class="dnr-date-input"
            >

          </div>

        </div>

      </div>

    </div>

    <!-- TABLE -->
    <div class="dnr-table-wrap">

      <table class="dnr-table">

        <thead>

          <tr>

            <th>DNR ID</th>

            <th>
              Invoice Return Ref.
            </th>

            <th>
              Customer Name
            </th>

            <th>
              DNR Date
            </th>

            <th class="dnr-sort-th" id="statusSortTh">
              <span class="dnr-sort-trigger">
                <span>Status</span>
                <span class="dnr-sort-caret" aria-hidden="true">⇅</span>
              </span>

              <div class="dnr-sort-menu" id="statusSortMenu">
                <button type="button" data-sort="newest">Newest First</button>
                <button type="button" data-sort="oldest">Oldest First</button>
                <button type="button" data-sort="progress">Progressing (Draft → Cancelled)</button>
                <button type="button" data-sort="reverse">Reverse Progressing (Cancelled → Draft)</button>
              </div>
            </th>

            <th>
              Action
            </th>

          </tr>

        </thead>

        <tbody id="dnrTbody">

          <tr id="dnrNoDataRow">
            <td colspan="6" class="dnr-empty">
              <div class="dnr-empty-text">
                No Delivery Note Returns found
              </div>
            </td>
          </tr>

        </tbody>

      </table>

    </div>

    <!-- FOOTER -->
    <div class="dnr-footer">

      <div
        class="dnr-showing"
        id="dnrShowingText"
      >
        Showing 0-0 of 0 Entries
      </div>

      <div class="dnr-pager">

        <button
          type="button"
          class="dnr-btn-page"
          id="dnrPrevBtn"
        >
          Prev
        </button>

        <div
          class="dnr-page-text"
          id="dnrPageText"
        >
          <strong>1</strong> of <strong>1</strong>
        </div>

        <button
          type="button"
          class="dnr-btn-page"
          id="dnrNextBtn"
        >
          Next
        </button>

      </div>

    </div>

  </div>

</div>

{% endblock %}

{% block extra_js %}

<script src="{{ url_for('static', filename='deliverynote-return.js') }}"></script>

{% endblock %}
