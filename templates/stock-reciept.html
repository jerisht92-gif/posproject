{% extends "menu.html" %}
 
{% block title %}Stock Receipt{% endblock %}
 
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='stock-reciept.css') }}">
 
<div class="stock-receipt-container">
 
   
<div class="page-header">
    <h2>Stock Receipt Note</h2>

    <a href="{{ url_for('stock_new') }}">
        <button class="btn">+ New Stock Receipt</button>
    </a>
</div>

<div class="card">
 
<div class="search-section">
    <input type="text" id="searchInput" placeholder="Search by ID number">
    <button class="clear-filter" type="button">Clear Filter</button>
</div>
 
 
 
<!-- Filters -->
    <div class="filter-row">
 
        <div class="filter-box">
            <label>Status</label>
            <div class="custom-select">
            <select id="stockrecieptstatus">
                 <option value="all">All</option>
                <option value="draft">Draft</option>
                <option value="submitted">Submitted</option>
                <option value="returned">Returned</option>
                <option value="cancelled">Cancelled</option>
            </select>
            </div>
        </div>
 
        <div class="filter-box">
            <label>Supplier Name</label>
            <div class="custom-select">
            <select id="suplier">

             <option value="all">All Suppliers</option>

            </select>
            </div>
        </div>
 
        <div class="filter-box date-box">
            <label>Recieved Date</label>
            <div class="sr-date-wrap">
            <!-- From -->
            <div class="sr-date-field">
                <span class="sr-date-text">From</span>
                <input type="date" id="srFromDate" class="sr-date-input">
                <span class="sr-cal">|</span>
            </div>
 
            <!-- To -->
            <div class="sr-date-field">
                <span class="sr-date-text">To</span>
                <input type="date" id="srToDate" class="sr-date-input">
                <span class="sr-cal"></span>
            </div>
            </div>
        </div>
 
    </div>

 <div class="table-scroll">
 
<table>
    <thead>
        <tr>
            <th>S.No</th>
            <th>GRN ID</th>
            <th>PO ID</th>
            <th>Supplier</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th>Received By</th>
            <th>QC Done By</th>
            <th>Actions</th>
           
   
           
        </tr>
    </thead>
    <tbody id="tableBody">
        
    </tbody>
</table>
 </div>
 
       <!-- Footer -->
    <div class="table-footer">
 
        <div class="entries">
            Showing <span id="showStart">0</span>–<span id="showEnd">0</span>
            of <span id="totalEntries">0</span> Entries
        </div>
 
        <div class="pagination">
            <button class="prev-btn">Prev</button>
            <span id="pageInfo">Page 1 of 1</span>
            <button class="next-btn">Next</button>
        </div>
 
    </div>
</div>
 
</div>
<script src="{{ url_for('static', filename='stock-reciept.js') }}"></script>
 
 
{% endblock %}
