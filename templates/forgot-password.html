<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='forgot-password.css') }}">  
</head>
<body class="forgot-page">
  <div class="wave-container" aria-hidden="true">
    <svg class="wave wave-top" viewBox="0 0 600 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gradientWaveForgot" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7B1E2B" />
          <stop offset="50%" stop-color="#A52A2A" />
          <stop offset="100%" stop-color="#7B1E2B" />
        </linearGradient>
      </defs>
      <path d="M0,0 C150,200 450,0 600,150 L600,0 Z"></path>
    </svg>
    <svg class="wave wave-bottom" viewBox="0 0 600 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gradientWaveForgotBottom" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7B1E2B" />
          <stop offset="50%" stop-color="#A52A2A" />
          <stop offset="100%" stop-color="#7B1E2B" />
        </linearGradient>
      </defs>
      <path d="M0,150 C150,300 450,100 600,300 L0,300 Z"></path>
    </svg>
  </div>
  <div class="forgot-container">
    <div class="right-section">
      <div class="forgot-box">

        <!-- Logo -->
        <div class="image1">
          <img
            src="{{ url_for('static', filename='images/stack-img.webp') }}"
            alt="Stackly Logo"
            class="stackly-logo card-logo"
          >
        </div>

        <h2 class="forgot-title">Forgot Your Password?</h2>
        <p class="forgot-subtext">
          No worries! Enter your email and we’ll send a reset link.
        </p>

        <form id="forgotForm">
          <div class="input-group">
            <label for="fpEmail">Email Address</label>
            <input
              type="email"
              id="fpEmail"
              placeholder="Enter your email address"
              required
            />
            <small id="fpEmailError" class="error"></small>
          </div>

          <button type="button" id="fpSendBtn" class="send-btn">
            Send reset link
          </button>

          <!-- Status message from JS -->
          <p id="fpStatus" class="status-msg"></p>

          <div class="footer-text">
            Remember your password? <a href="{{ url_for('login') }}">Log In</a>
          </div>
        </form>

      </div><!-- /.forgot-box -->
    </div><!-- /.right-section -->
  </div><!-- /.forgot-container -->

  <!-- JS at bottom -->
  {% include '_stackly_config_scripts.html' %}
  <script src="{{ url_for('static', filename='forgot-password.js') }}"></script>
</body>
</html>
