<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='reset-password.css') }}">
</head>

<body class="reset-page" data-token="{{ token }}">
  <div class="wave-container" aria-hidden="true">
    <svg class="wave wave-top" viewBox="0 0 600 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gradientWaveReset" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7B1E2B" />
          <stop offset="50%" stop-color="#A52A2A" />
          <stop offset="100%" stop-color="#7B1E2B" />
        </linearGradient>
      </defs>
      <path d="M0,0 C150,200 450,0 600,150 L600,0 Z"></path>
    </svg>
    <svg class="wave wave-bottom" viewBox="0 0 600 300" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gradientWaveResetBottom" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#7B1E2B" />
          <stop offset="50%" stop-color="#A52A2A" />
          <stop offset="100%" stop-color="#7B1E2B" />
        </linearGradient>
      </defs>
      <path d="M0,150 C150,300 450,100 600,300 L0,300 Z"></path>
    </svg>
  </div>

  <div class="reset-container">
    <div class="right-section">
      <div class="reset-box">
        <div class="image1">
          <img
            src="{{ url_for('static', filename='images/stack-img.webp') }}"
            alt="Stackly Logo"
            class="stackly-logo card-logo"
          >
        </div>

        <h2 class="reset-title">Reset Your Password</h2>
        <p class="reset-subtext">
          Create a strong new password for your Stackly account.
        </p>

        <form id="resetForm" novalidate>
          <div class="input-group password-group">
            <label for="newPassword">New Password</label>
            <div class="password-container">
              <input
                type="password"
                id="newPassword"
                placeholder="Create a new password"
                maxlength="20"
                autocomplete="new-password"
              />
              <button
                type="button"
                id="toggleNewPwd"
                class="eye-btn"
                aria-label="Show or hide password"
              >
                <svg id="eyeNewIcon" class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <small id="capsWarning" class="caps-warning" aria-live="polite"></small>
            <small class="error" id="newPwdError"></small>
          </div>

          <div class="input-group password-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-container">
              <input
                type="password"
                id="confirmPassword"
                placeholder="Re-enter the password"
                maxlength="20"
                autocomplete="new-password"
              />
              <button
                type="button"
                id="toggleConfirmPwd"
                class="eye-btn"
                aria-label="Show or hide password"
              >
                <svg id="eyeConfirmIcon" class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <small class="error" id="confirmPwdError"></small>
          </div>

          <button type="button" id="resetBtn" class="send-btn">
            Update Password
          </button>

          <p id="resetStatus" class="status-msg"></p>

          <div class="footer-text">
            <a href="{{ url_for('login') }}">Back to Log In</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  {% include '_stackly_config_scripts.html' %}
  <script src="{{ url_for('static', filename='reset-password.js') }}" defer></script>
</body>
</html>
