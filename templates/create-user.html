{% extends "menu.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='create-user.css') }}">
{% endblock %}

{% block content %}
<div class="create-user-page">

  <!-- Header: title center + close icon right -->
  <div class="create-header">
    <h1 class="create-title">Create New Branch Users</h1>

    <!-- Close icon – back to Manage Users -->
    <a href="{{ url_for('manage_users') }}" class="close-btn" aria-label="Close">
      ✕
    </a>
  </div>

  <!-- Form card -->
  <div class="create-card">
    <form class="create-form">

      <!-- Row 1 -->
      <div class="form-row">
        <div class="form-field">
          <label for="firstName">First Name</label>
          <input id="firstName" type="text" placeholder="First Name">
        </div>

        <div class="form-field">
          <label for="lastName">Last Name</label>
          <input id="lastName" type="text" placeholder="Last Name">
        </div>
      </div>

      <!-- Row 2 -->
      <div class="form-row">
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Stackly@gmail.com">
        </div>

        <div class="form-field">
          <label for="contact">Contact Number</label>
          <input id="contact" type="text" placeholder="0000000000">
        </div>
      </div>

      <!-- Row 3 -->
      <div class="form-row">
        <div class="form-field">
          <label for="branch">Branch</label>
          <select id="branch">
            <option value="">Select a branch</option>
            <option>Main Branch</option>
            <option>Branch 1</option>
            <option>Branch 2</option>
          </select>
        </div>

        <div class="form-field">
          <label for="department">Department</label>
          <select id="department">
            <option value="">Select Department</option>
            <option>Sales</option>
            <option>HR</option>
            <option>Accounts</option>
          </select>
        </div>
      </div>

      <!-- Row 4 -->
      <div class="form-row">
        <div class="form-field">
          <label for="role">Role</label>
          <select id="role">
            <option value="">Select Designation</option>
            <option>Admin</option>
            <option>Manager</option>
            <option>Staff</option>
          </select>
        </div>

        <div class="form-field">
          <label for="reportingTo">Reporting To</label>
          <input id="reportingTo" type="text" placeholder="0000000000">
        </div>
      </div>

      <!-- Row 5 -->
      <div class="form-row">
        <div class="form-field">
          <label for="availableBranches">Available Branches</label>
          <input id="availableBranches" type="text" placeholder="e.g., 1,2">
        </div>

        <div class="form-field">
          <label for="employeeId">Employee ID</label>
          <input id="employeeId" type="text" placeholder="Enter Employee ID">
        </div>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <button type="button" class="btn-outline">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>

    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='no-screenshot.js') }}"></script>
{% endblock %}
