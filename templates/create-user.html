{% extends "menu.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='create-user.css') }}">
{% endblock %}

{% block content %}
<div class="create-user-page">

  <!-- Header: title center + close icon right -->
  <div class="create-header">
    <h1 class="create-title">Create New Branch Users</h1>

    <!-- Close icon – back to Manage Users -->
    <a href="{{ url_for('manage_users') }}" class="close-btn" aria-label="Close">
      ✕
    </a>
  </div>

<!-- Form card -->
<div class="create-card">
  <form class="create-form" method="POST" action="{{ url_for('create_user') }}">

    <!-- Row 1 -->
    <div class="form-row">
      <div class="form-field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="first_name" type="text" placeholder="First Name" required>
      </div>

      <div class="form-field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="last_name" type="text" placeholder="Last Name" required>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="form-row">
      <div class="form-field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Stackly@gmail.com" required>
      </div>

      <div class="form-field">
        <label for="contact">Contact Number</label>
        <input id="contact" name="contact_number" type="text" placeholder="0000000000" required>
      </div>
    </div>

    <!-- Row 3 -->
    <div class="form-row">
      <div class="form-field">
        <label for="branch">Branch</label>
        <select id="branch" name="branch" required>
          <option value="">Select a branch</option>
          <option>Main Branch</option>
          <option>Branch 1</option>
          <option>Branch 2</option>
        </select>
      </div>

      <div class="form-field">
        <label for="department">Department</label>
        <select id="department" name="department" required>
          <option value="">Select Department</option>
          <option>Sales</option>
          <option>HR</option>
          <option>Accounts</option>
        </select>
      </div>
    </div>

    <!-- Row 4 -->
    <div class="form-row">
      <div class="form-field">
        <label for="role">Role</label>
        <select id="role" name="role" required>
          <option value="">Select Designation</option>
          <option>Admin</option>
          <option>Manager</option>
          <option>Staff</option>
        </select>
      </div>

      <div class="form-field">
        <label for="reportingTo">Reporting To</label>
        <input id="reportingTo" name="reporting_to" type="text" placeholder="0000000000">
      </div>
    </div>

    <!-- Row 5 -->
    <div class="form-row">
      <div class="form-field">
        <label for="availableBranches">Available Branches</label>
        <input id="availableBranches" name="available_branches" type="text" placeholder="e.g., 1,2">
      </div>

      <div class="form-field">
        <label for="employeeId">Employee ID</label>
        <input id="employeeId" name="employee_id" type="text" placeholder="Enter Employee ID">
      </div>
    </div>

    <!-- Buttons -->
    <div class="form-actions">
      <a href="{{ url_for('manage_users') }}" class="btn-outline">Cancel</a>
      <button type="submit" class="btn-primary">Save</button>
    </div>

  </form>
</div>
{% endblock %}
